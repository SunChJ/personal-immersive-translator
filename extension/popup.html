<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prism — Immersive Translator</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header class="popup-header">
        <div class="brand">
          <svg class="brand-mark" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 4 L20 19 L4 19 Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="rgba(42,111,219,0.12)"/>
          </svg>
          <h1>Prism</h1>
        </div>
        <button id="kebab" class="kebab" type="button" aria-label="More settings" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </header>

      <button id="translate" class="translate-card">
        <span>
          <strong>Translate this page</strong>
          <small id="translateSubtitle">English detected → 中文 (简体)</small>
        </span>
        <span class="toggle-visual" aria-hidden="true"></span>
      </button>

      <section class="settings-list">
        <label class="setting-row">
          <span>Target language</span>
          <select id="targetLanguage">
            <option value="Chinese (Simplified)">中文 (简体)</option>
            <option value="Chinese (Traditional)">中文 (繁体)</option>
            <option value="English">English</option>
            <option value="Japanese">日本語</option>
            <option value="Korean">한국어</option>
            <option value="French">Français</option>
            <option value="German">Deutsch</option>
            <option value="Spanish">Español</option>
            <option value="Portuguese">Português</option>
            <option value="Italian">Italiano</option>
            <option value="Russian">Русский</option>
            <option value="Arabic">العربية</option>
            <option value="Hindi">हिन्दी</option>
            <option value="Vietnamese">Tiếng Việt</option>
            <option value="Thai">ไทย</option>
            <option value="Indonesian">Indonesia</option>
            <option value="__custom__">Custom…</option>
          </select>
        </label>
        <input id="customTargetLanguage" class="custom-language" placeholder="e.g. Polish, Dutch, Brazilian Portuguese" autocomplete="off" hidden>

        <div class="setting-row">
          <span>Display</span>
          <div class="segmented" role="group" aria-label="Display mode">
            <button type="button" data-mode="bilingual">Bilingual</button>
            <button type="button" data-mode="replace">Replace</button>
          </div>
          <select id="mode" hidden>
            <option value="bilingual">Bilingual</option>
            <option value="replace">Replace original</option>
          </select>
        </div>

        <button id="styleToggle" class="setting-row setting-row-button" type="button" aria-expanded="false">
          <span>Bilingual style</span>
          <span class="chip"><span id="styleLabel">Dashed underline</span><span class="caret" aria-hidden="true"></span></span>
        </button>
        <select id="bilingualStyle" hidden>
          <option value="dashed">Dashed underline</option>
          <option value="dotted">Dotted underline</option>
          <option value="wavy">Wavy underline</option>
          <option value="highlight">Highlight</option>
          <option value="soft-box">Soft box</option>
          <option value="blur">Blur</option>
        </select>

        <label class="switch-row">
          <span>Translate on selection</span>
          <input id="translateSelection" type="checkbox" checked>
          <span class="switch-track" aria-hidden="true"></span>
        </label>
        <label class="switch-row">
          <span>Floating button</span>
          <input id="showFloatingButton" type="checkbox" checked>
          <span class="switch-track" aria-hidden="true"></span>
        </label>
        <label class="switch-row">
          <span>Auto-translate this site</span>
          <input id="autoTranslateSite" type="checkbox">
          <span class="switch-track" aria-hidden="true"></span>
        </label>
      </section>

      <section id="stylePicker" class="style-picker" aria-label="Bilingual style picker" hidden>
        <div class="section-head">
          <strong>Translation style</strong>
          <span>applies to bilingual mode</span>
        </div>
        <div class="style-grid">
          <button class="style-card" type="button" data-style="dashed">
            <span class="sample-source">The galaxies formed early.</span>
            <span class="sample-translation sample-dashed">这些星系形成得很早。</span>
            <span class="choice-row"><span class="choice-dot"></span><strong>Dashed underline</strong></span>
          </button>
          <button class="style-card" type="button" data-style="dotted">
            <span class="sample-source">The galaxies formed early.</span>
            <span class="sample-translation sample-dotted">这些星系形成得很早。</span>
            <span class="choice-row"><span class="choice-dot"></span><strong>Dotted underline</strong></span>
          </button>
          <button class="style-card" type="button" data-style="wavy">
            <span class="sample-source">The galaxies formed early.</span>
            <span class="sample-translation sample-wavy">这些星系形成得很早。</span>
            <span class="choice-row"><span class="choice-dot"></span><strong>Wavy underline</strong></span>
          </button>
          <button class="style-card" type="button" data-style="highlight">
            <span class="sample-source">The galaxies formed early.</span>
            <span class="sample-translation sample-highlight">这些星系形成得很早。</span>
            <span class="choice-row"><span class="choice-dot"></span><strong>Highlight</strong></span>
          </button>
          <button class="style-card" type="button" data-style="soft-box">
            <span class="sample-source">The galaxies formed early.</span>
            <span class="sample-translation sample-soft-box">这些星系形成得很早。</span>
            <span class="choice-row"><span class="choice-dot"></span><strong>Soft box</strong></span>
          </button>
          <button class="style-card" type="button" data-style="blur">
            <span class="sample-source">The galaxies formed early.</span>
            <span class="sample-translation sample-blur">这些星系形成得很早。</span>
            <span class="choice-row"><span class="choice-dot"></span><strong>Blur</strong></span>
          </button>
        </div>
      </section>

      <section id="serverPanel" class="server-footer">
        <div class="server-copy">
          <span class="status-dot" aria-hidden="true"></span>
          <strong id="serverState">Checking…</strong>
        </div>
        <span id="health" class="conn">Checking</span>
      </section>

      <section id="overflow" class="overflow" hidden>
        <label class="stacked-field">
          <span>Local server</span>
          <input id="endpoint" value="http://127.0.0.1:8787" autocomplete="off">
        </label>
        <div class="overflow-meta"><span>Latency</span><span id="latency" class="meta">--</span></div>
        <label class="checkbox">
          <input id="clearPrevious" type="checkbox" checked>
          Clear before translating
        </label>
        <label class="checkbox">
          <input id="viewportFirst" type="checkbox" checked>
          Translate visible text first
        </label>
        <div class="actions">
          <button id="clear" class="secondary">Clear page</button>
          <button id="recheck" class="secondary">Recheck</button>
        </div>
        <div id="offlineHelp" class="offline" hidden>
          <p>Start the local server from this repository, then recheck.</p>
          <button id="copyCommand" class="secondary">Copy start command</button>
        </div>
      </section>

      <p id="status" role="status"></p>
    </main>

    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
